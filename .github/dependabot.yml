version: 2
registries:
  utilities-registry:
    type: maven-repository
    url: https://maven.pkg.github.com/jcequispe/demo-utilities-jakarta
  bom-registry:
    type: maven-repository
    url: https://maven.pkg.github.com/jcequispe/demo-bom-jakarta
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "daily"
    registries:
      - utilities-registry
      - bom-registry
    open-pull-requests-limit: 10
    reviewers:
      - "jcequispe"
    commit-message:
      prefix: "bump"
      include: "scope"
